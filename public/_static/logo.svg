<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Outer circle gradient -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6BA3A0"/>
      <stop offset="100%" stop-color="#7FB8B4"/>
    </linearGradient>
    <!-- Green square gradient -->
    <linearGradient id="squareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9B62"/>
      <stop offset="40%" stop-color="#3ECF8E"/>
      <stop offset="100%" stop-color="#5EDBA5"/>
    </linearGradient>
    <!-- Organic wave overlay -->
    <radialGradient id="wave1" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#4BD89A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2D9B62" stop-opacity="0"/>
    </radialGradient>
    <!-- Bubble stroke gradient -->
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9BE8B8"/>
      <stop offset="100%" stop-color="#C5F0D0"/>
    </linearGradient>
  </defs>

  <!-- Outer teal circle -->
  <circle cx="256" cy="256" r="250" fill="url(#circleGrad)"/>

  <!-- Green rounded square -->
  <rect x="88" y="88" width="336" height="336" rx="72" fill="url(#squareGrad)"/>

  <!-- Subtle wave overlay for depth -->
  <rect x="88" y="88" width="336" height="336" rx="72" fill="url(#wave1)"/>

  <!-- Chat bubble outline with tail -->
  <path
    d="M256 148
       C332 148 384 196 384 254
       C384 312 332 356 262 358
       L224 398
       L208 354
       C146 344 128 302 128 254
       C128 196 180 148 256 148 Z"
    fill="none"
    stroke="url(#bubbleGrad)"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
